<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> 😲</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* BODY */
body {
    height: 120vh;
    background: linear-gradient(135deg, #ff03d5, #330757, #8a1646);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* COMMON CARD */
.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    padding: 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 350px;
    text-align: center;
    box-shadow: 0 0 30px rgba(0,0,0,0.4);
}

/* INPUT */
input {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    border-radius: 10px;
    border: none;
    outline: none;
}

/* BUTTON */
button2 {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: linear-gradient(45deg, #ff4e50, #fc913a);
    color: white;
    cursor: pointer;
}

/* ERROR */
#error {
    color: #ff4e50;
    margin-top: 10px;
    font-size: 0.9rem;
}

/* HIDE */
.hidden {
    display: none;
}

/* Birthday Page */
.container {
    text-align: center;
}

#message {
    margin-top: 10px;
    min-height: 40px;
}

.slideshow img {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

/* Canvas */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}


/* From Uiverse.io by mrhyddenn */ 
.shadow__btn {
  padding: 10px 20px;
  border: none;
  font-size: 17px;
  color: #fff;
  border-radius: 7px;
  letter-spacing: 4px;
  font-weight: 700;
  text-transform: uppercase;
  transition: 0.5s;
  transition-property: box-shadow;
}

.shadow__btn {
  background: rgb(0,140,255);
  box-shadow: 0 0 25px rgb(0,140,255);
}

.shadow__btn:hover {
  box-shadow: 0 0 5px rgb(0,140,255),
              0 0 25px rgb(0,140,255),
              0 0 50px rgb(0,140,255),
              0 0 100px rgb(0,140,255);
}


/* From Uiverse.io by gharsh11032000 */ 
.button {
  position: relative;
  width: 120px;
  height: 40px;
  background-color: #000000;
  display: flex;
  align-items: center;
  color: white;
  flex-direction: column;
  justify-content: center;
  border: none;
  padding: 12px;
  gap: 12px;
  border-radius: 8px;
  cursor: pointer;
}

.button::before {
  content: '';
  position: absolute;
  inset: 0;
  left: -4px;
  top: -1px;
  margin: auto;
  width: 128px;
  height: 48px;
  border-radius: 10px;
  background: linear-gradient(-45deg, #b700ff 0%, #00ff95 100% );
  z-index: -10;
  pointer-events: none;
  transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.button::after {
  content: "";
  z-index: -1;
  position: absolute;
  inset: 0;
  background: linear-gradient(-45deg, #fc00ff 0%, #00dbde 100% );
  transform: translate3d(0, 0, 0) scale(0.95);
  filter: blur(20px);
}

.button:hover::after {
  filter: blur(30px);
}

.button:hover::before {
  transform: rotate(-180deg);
}

.button:active::before {
  scale: 0.7;
}






</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div class="card" id="loginPage">
    <h2>🔐 Enter Password</h2>
    <input type="password" id="password" placeholder="Enter password">
    <br>
    <br>
    <button onclick="checkPassword()" class="shadow__btn ">click me!</button>
    <div id="error"></div>
</div>

<!-- BIRTHDAY PAGE -->
<div class="card hidden" id="birthdayPage" style="text-align: center;" >
    <h2 >click the Celebrate button 🥰😘👩‍❤️‍👨⬇️ </h2>
    <div id="message"></div>
    <br>
   
    
    <button onclick="startCelebration()" class="button"  style="display: block; margin: auto;">Celebrate 🎊</button>

    <div class="slideshow">
        <img id="slide" src="screenshot-1133-1710220427152-compressed.png">
    </div>
</div>

<canvas id="confetti"></canvas>

<script>
/* PASSWORD CHECK */
const correctPassword = "1122";

function checkPassword() {
    const input = document.getElementById("password").value;

    if (input === correctPassword) {
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("birthdayPage").classList.remove("hidden");
    } else {
        document.getElementById("error").innerText = "❌ Wrong password!";
    }
}

/* TYPING */
const text = `

Happy Birthday, my sweet Sudu 💖🎂, you’re my happiness, my peace, and my favorite person in this world. Every moment with you feels special, and I’m so lucky to have you in my life.

I hope your day is filled with love, laughter, and all the little things that make you smile. You deserve the cutest, happiest birthday ever — just like you 🥰✨

Love you always, Sudu 💕🤍
`;
let i = 0;

function typeEffect() {
    if (i < text.length) {
        document.getElementById("message").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 50);
    }
}

/* SLIDESHOW */
const images = [
    "Screenshot_20260401_130848_Instagram.jpg",
    "IMG-20260327-WA0021.jpg",
    "IMG-20260106-WA0013.jpg",
    "IMG-20260106-WA0014.jpg",
    "IMG-20260116-WA0024_Nero_AI_Image_Upscaler_Standard_Face.jpg",
    "Screenshot_20260401_130828_Instagram.jpg",
    "Screenshot_20260401_130848_Instagram.jpg"
];

let index = 0;
let slideshowStarted = false; // prevent repeat

function startSlideshow() {
    if (slideshowStarted) return; // avoid multiple intervals
    slideshowStarted = true;

    setInterval(() => {
        index = (index + 1) % images.length;
        document.getElementById("slide").src = images[index];
    }, 3000);
}

/* CONFETTI */
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let confetti = [];

function initConfetti() {
    for (let i = 0; i < 100; i++) {
        confetti.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 5 + 3,
            speed: Math.random() * 3 + 2,
            color: `hsl(${Math.random()*360},100%,50%)`
        });
    }
}

function drawConfetti() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    confetti.forEach(c => {
        ctx.fillStyle = c.color;
        ctx.fillRect(c.x, c.y, c.size, c.size);
        c.y += c.speed;

        if (c.y > canvas.height) {
            c.y = -10;
        }
    });

    requestAnimationFrame(drawConfetti);
}

/* START */
let started = false;

function startCelebration() {
    if (started) return;
    started = true;

    typeEffect();
    startSlideshow();
    initConfetti();
    drawConfetti();
}

/* ENTER KEY SUPPORT */
document.getElementById("password").addEventListener("keypress", function(e){
    if (e.key === "Enter") checkPassword();
});
</script>

</body>
</html>
